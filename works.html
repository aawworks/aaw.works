<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAWW - Works</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            color: #000000;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 32px;
        }

        .nav {
            font-size: 18px;
        }

        .nav a {
            text-decoration: none;
            color: #000000;
            margin-left: 30px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .project img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Variable height rows */
        .project {
            margin-bottom: 20px;
        }

        /* Some projects span multiple columns */
        .project.wide {
            grid-column: span 2;
        }

        /* Some projects span multiple rows */
        .project.tall {
            grid-row: span 2;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">AAWW 建築事務所</div>
        <div class="nav">
            <a href="works.html">Works</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div class="projects-grid">
        <div class="project"><img src="photos (1).jpg" alt=""></div>
        <div class="project"><img src="photos (2).jpg" alt=""></div>
        <div class="project"><img src="photos (3).jpg" alt=""></div>
        <div class="project wide"><img src="photos (4).jpg" alt=""></div>
        <div class="project"><img src="photos (5).jpg" alt=""></div>
        <div class="project"><img src="photos (6).jpg" alt=""></div>
        <div class="project tall"><img src="photos (7).jpg" alt=""></div>
        <div class="project"><img src="photos (8).jpg" alt=""></div>
        <div class="project"><img src="photos (9).jpg" alt=""></div>
        <div class="project"><img src="photos (10).jpg" alt=""></div>
        <div class="project wide"><img src="photos (11).jpg" alt=""></div>
        <div class="project"><img src="photos (12).jpg" alt=""></div>
        <div class="project"><img src="photos (13).jpg" alt=""></div>
        <div class="project"><img src="photos (14).jpg" alt=""></div>
        <div class="project"><img src="photos (15).jpg" alt=""></div>
    </div>
</body>
</html>
